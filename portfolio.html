<!DOCTYPE html>

<body>
  <header>
    <div class="container nav">
      <a class="logo" href="index.html">

      <button class="nav-toggle" aria-label="Open menu">Menu</button>

      </div>

    <section>
      <div class="container">
        <div class="gallery">
          <figure><img src="images/senior-cello.png" alt="Senior portrait with cello"><figcaption>Senior</figcaption></figure>

          <figure><img src="images/sunset-fashion.png" alt="Fashion portrait at sunset"><figcaption>Editorial</figcaption></figure>
          <figure><img src="images/senior-plane-wide.png" alt="Senior by airplane"><figcaption>Senior</figcaption></figure>

          <figure><img src="images/senior-fall-field.png" alt="Senior portrait in field"><figcaption>Senior</figcaption></figure>
          <figure><img src="images/wedding-kiss.png" alt="Wedding ceremony kiss"><figcaption>Wedding</figcaption></figure>
          <figure><img src="images/sisters-portrait.png" alt="Portrait of sisters"><figcaption>Portrait</figcaption></figure>
          <figure><img src="images/family-dogs-sunset.png" alt="Family with dogs at sunset"><figcaption>Family</figcaption></figure>
          <figure><img src="images/dog-portrait.png" alt="Dog portrait"><figcaption>Pet</figcaption></figure>

      </div>
